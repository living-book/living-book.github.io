function leafAppearance(d) {

  const dom = catColor(d);
  if (d.data.tier === 2) return { fill: dom, stroke: "#141413", sw: 1.0 };
  return { fill: "#faf9f5", stroke: dom, sw: 1.8 };
}

const svg = d3.select("svg");
const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.2, 4]).clickDistance(10).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

const width = window.innerWidth, height = window.innerHeight;
const radius = Math.min(width, height) / 2 - 90;

const root = d3.hierarchy(DATA);
root.x0 = 0; root.y0 = 0;
root.children.forEach(collapse);
function collapse(d) {
  if (d.children) { d._children = d.children; d._children.forEach(collapse); d.children = null; }
}
function collapseAllExceptPathTo(target) {
  root.each(d => { if (d.children) { d._children = d.children; d.children = null; } });
  let cur = target; const path = [];
  while (cur) { path.unshift(cur); cur = cur.parent; }
  path.forEach(d => { if (d._children) { d.children = d._children; d._children = null; } });
}
function catColor(d) { let n = d; while (n.parent && !n.data.color) n = n.parent; return n.data.color || "#888"; }

const treeLayout = d3.tree().size([2 * Math.PI, radius]).separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth || 1);

function tierNote(d) {
  if (d.data.flagged) return " (" + d.data.status + ")";
  if (d.data.tier === 2) return " — full companion ↗";
  if (d.data.tier === 1) return " — in the Concept Atlas ↗";
  return "";
}

function update(source) {
  treeLayout(root);
  const nodes = root.descendants(), links = root.links();
  const radialPoint = (x, y) => [y * Math.cos(x - Math.PI / 2), y * Math.sin(x - Math.PI / 2)];

  const link = g.selectAll(".link").data(links, d => d.target.data.name + d.source.data.name);
  link.join(
    enter => enter.append("path").attr("class", "link")
      .attr("d", d => { const lg = d3.linkRadial().angle(p => p.x).radius(p => p.y);
        return lg({ source: { x: source.x0 ?? d.source.x, y: source.y0 ?? d.source.y }, target: { x: source.x0 ?? d.source.x, y: source.y0 ?? d.source.y } }); })
      .call(e => e.transition().duration(500).attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y))),
    update => update.transition().duration(500).attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y)),
    exit => exit.transition().duration(300).style("opacity", 0).remove()
  );

  const node = g.selectAll(".node").data(nodes, d => d.data.name + (d.parent ? d.parent.data.name : ""));
  const nodeEnter = node.enter().append("g")
    .attr("class", d => "node " + (d.children || d._children ? "node-branch" : "node-leaf") + (!d.children && !d._children && d.data.href ? " linked" : ""))
    .attr("transform", d => { const [x, y] = radialPoint(source.x0 ?? d.x, source.y0 ?? d.y); return `translate(${x},${y})`; })
    .style("opacity", 0)
    .on("click", (event, d) => {
      if (d.children || d._children) {
        if (d.children) { d._children = d.children; d.children = null; }
        else { collapseAllExceptPathTo(d); }
        update(d);
      } else if (d.data.href) {
        window.open(d.data.href, "_blank", "noopener");
      }
    });

  nodeEnter.filter(d => d.children || d._children).append("circle").attr("r", 5);

  nodeEnter.filter(d => !d.children && !d._children).append("path")
    .attr("class", "leaf")
    .attr("d", "M0,-7 C4,-7 6,-3 6,0 C6,4 3,7 0,10 C-3,7 -6,4 -6,0 C-6,-3 -4,-7 0,-7 Z")
    .each(function (d) { const a = leafAppearance(d); d3.select(this).attr("fill", a.fill).attr("stroke", a.stroke).attr("stroke-width", a.sw); })
    .attr("transform", d => `rotate(${(d.x * 180 / Math.PI) - 90})`)
    .append("title").text(d => d.data.name + tierNote(d) + (d.data.author ? " · " + d.data.author : ""));

  nodeEnter.filter(d => d.children || d._children).append("text")
    .attr("class", "node-label").attr("dy", "0.32em")
    .attr("x", d => (d.x < Math.PI ? 8 : -8))
    .attr("text-anchor", d => (d.x < Math.PI ? "start" : "end"))
    .text(d => d.data.name);

  const nodeUpdate = node.merge(nodeEnter);
  nodeUpdate.transition().duration(500).style("opacity", 1)
    .attr("transform", d => { const [x, y] = radialPoint(d.x, d.y); return `translate(${x},${y})`; });
  node.exit().transition().duration(300).style("opacity", 0)
    .attr("transform", d => { const [x, y] = radialPoint(source.x, source.y); return `translate(${x},${y})`; })
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

// Center via the zoom itself so g's transform and d3-zoom's internal state start in
// sync. Setting g.transform directly left the zoom thinking the view was at the origin,
// so the first pointer gesture per page load snapped the diagram to the top-left and
// swallowed the click that should have opened the linked page.
svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2));
update(root);

</script>
