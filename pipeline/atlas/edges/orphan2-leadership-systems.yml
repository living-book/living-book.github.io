- from: law-of-raspberry-jam
  verb: tempers
  to: connective-advantage
  why: >-
    Connective-advantage rates networks partly by breadth (the B in BCD),
    but raspberry jam's reach-thins-depth tradeoff shows that maximizing
    that breadth necessarily dilutes the connectivity and depth of any
    single relationship in it.

- from: attending-exquisitely
  verb: tempers
  to: theory-laden-perception
  why: >-
    Repeating a speaker's exact words back, instead of paraphrasing, is a
    disciplined technique that narrows how far the listener's own governing
    framework can silently overwrite the speaker's meaning.

- from: maturing-changes
  verb: parallels
  to: protecting-the-new
  why: >-
    Both describe a newly formed thing — a shift in thinking, a new idea —
    as inherently fragile at inception, requiring deliberate protected
    development before it can survive real-world or organizational pressure.

- from: artifacts-as-external-memory
  verb: instantiates
  to: knowledge-in-the-world
  why: >-
    A sticky note is a concrete case of putting knowledge in the environment
    rather than demanding precise recall in the head, freeing working memory
    to reason about arrangement instead of holding content.

- from: game-space
  verb: parallels
  to: safe-to-fail-practice-environment
  why: >-
    Both create a bounded space where real-world consequences are suspended
    by mutual agreement or design, and it is precisely that suspension that
    lets participants act and experiment freely inside it.

- from: opening-exploring-closing
  verb: parallels
  to: one-direction-at-a-time
  why: >-
    Both claim a mind or group can only be well-tuned to one mode of
    thinking — divergent, exploratory, convergent — at a time, so running
    modes simultaneously degrades each one instead of combining them.

- from: randomness-reversal-reframing
  verb: parallels
  to: movement-over-judgment
  why: >-
    Both use deliberate provocation — scrambling order, inverting a
    convention, following an idea for where it leads rather than assessing
    fit — to break a mind's tendency to lock onto the first pattern found.

- from: celebration-reinforces-values
  verb: instantiates
  to: symbolic-frame
  why: >-
    Public, personally-involved celebration is a concrete case of the
    symbolic frame's claim that front-stage ritual meaning, not backstage
    accomplishment, is what actually broadcasts and cements what counts.

- from: attention-precedes-persuasion
  verb: parallels
  to: abstraction-erodes-empathy
  why: >-
    Both trace the same mechanism in opposite directions — vivid, personal,
    emotionally specific information captures attention and moral response,
    while distant, abstracted, numeric information fails to register at all.

- from: externalizing-the-obstacle
  verb: parallels
  to: circle-of-safety
  why: >-
    Both redirect a group's competitive or blaming energy from internal
    targets to an external one — a felt outside threat or antagonist —
    which is what stops people fighting each other and unifies effort.

- from: leaders-own-story
  verb: instantiates
  to: personal-mastery
  why: >-
    A leader's total, undiluted personal commitment to a goal before it can
    inspire others is a concrete case of personal mastery's claim that
    clarified personal vision is the root a shared, visible one grows from.

- from: asking-different-questions
  verb: parallels
  to: seeking-disconfirmation
  why: >-
    Both name the same default failure — cognition drifts toward confirming
    what it already believes — and prescribe the same corrective: a
    deliberate practice (reframe the question, hunt disproof) to escape it.

- from: seeing-systems
  verb: parallels
  to: self-perpetuating-problem
  why: >-
    Both reject "no pattern, just bad luck" as the explanation for a run of
    failures and insist a persistent structure is generating them — though
    self-perpetuating-problem locates that structure specifically in who
    benefits from the problem surviving, not a blame-free design flaw.

- from: taking-multiple-perspectives
  verb: tempers
  to: naive-perspective
  why: >-
    Deliberately constructing the heroic story an opposing person would
    tell about themselves checks naive-perspective's default habit of
    demonizing people who frustrate us through unexamined projection.

- from: incremental-closure
  verb: parallels
  to: prerequisite-tree
  why: >-
    Both convert an intractable, large whole — a contentious decision, an
    impossible goal — into an ordered sequence of smaller closable units,
    where resolving each one is what makes the next one reachable.

- from: classes-of-service
  verb: instantiates
  to: simple-rules
  why: >-
    A handful of named priority policies tuned to cost-of-delay is a
    concrete case of simple-rules' claim that a small set of rules-of-thumb
    for one bottleneck activity beats a comprehensive procedure.

- from: authority-override-in-emergencies
  verb: instantiates
  to: threshold-cascades
  why: >-
    People abandoning direct danger perception for official reassurance and
    others' visible inaction is the aggregate-crossing-personal-threshold
    mechanism threshold-cascades formalizes, applied to emergency evacuation.

- from: precision-targeting-not-broad-effort
  verb: parallels
  to: leverage
  why: >-
    Both claim a system's outcome is governed disproportionately by one
    specific, often nonobvious point, so concentrated action there vastly
    outperforms spreading the same total effort evenly across the problem.

- from: status-complexity-mismatch
  verb: parallels
  to: prestige-driven-regendering
  why: >-
    Both show a job's socially perceived status is governed by visible,
    symbolic factors decoupled from its actual complexity or who does it
    well, so status becomes an unreliable, sometimes misleading, signal.

- from: future-reality-tree
  verb: tempers
  to: iatrogenics
  why: >-
    Iatrogenic harm hides because helper and harm are rarely traced
    together, but diagramming an intervention's full predicted consequence
    chain, including the bad branches, surfaces that harm before acting.

- from: necessary-condition-thinking
  verb: parallels
  to: self-imposed-constraints
  why: >-
    Both claim a felt necessity or impossibility is usually an unexamined
    belief rather than an actual fact of the situation, and that explicitly
    surfacing the assumption for testing is what dissolves the barrier.

- from: sufficient-cause-thinking
  verb: parallels
  to: good-explanations
  why: >-
    Both demand a causal or explanatory claim be tightly constrained by
    what it purports to produce or explain before being accepted, rather
    than passing on plausibility alone — hunting the arrow you can't vary.

- from: bundle-self
  verb: parallels
  to: witnessing-thought
  why: >-
    Both dissolve the felt solidity of a unified self by decomposing it into
    transient thoughts, perceptions, and sensations that can be observed or
    inventoried rather than a fixed entity, stripping any one part of power.

- from: deflationary-meaning
  verb: parallels
  to: mind-your-meaning
  why: >-
    Both diagnose a claim as smuggling in one hidden, unexamined sense of an
    ambiguous word, and show that making the equivocation explicit dissolves
    a crisis or disagreement that was never about the substance.

- from: shareholder-value-trap
  verb: instantiates
  to: good-of-the-whole
  why: >-
    An organization hitting its aggregate financial metric while the people
    composing it are hollowed out is a concrete case of whole-level and
    part-level flourishing being logically separable, not the same measure.

- from: lifes-task
  verb: contradicts
  to: invented-purpose
  why: >-
    Life's-task claims one true, innate vocation is planted at birth and
    must be discovered, directly opposing invented-purpose's claim that a
    self-assigned purpose is no lesser grade than a "built-in" one.
