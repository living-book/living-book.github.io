- from: springboard-story
  verb: instantiates
  to: self-image-defense
  why: >-
    Self-image-defense's own prescription for effective influence is letting
    people arrive at the conclusion themselves rather than attacking it head-on;
    the springboard story is the concrete narrative technique that does exactly
    this, withholding detail so the listener's own imagination reaches the
    conclusion instead of being argued into it.

- from: audience-story-primacy
  verb: parallels
  to: self-image-defense
  why: >-
    Both locate persuasion's failure point before content is even weighed —
    a message is rejected or accepted by whether it fits an already-defended
    self-story, not by its soundness.

- from: power-sharing-paradox
  verb: parallels
  to: empowered-product-teams
  why: >-
    Both claim authority multiplies by being given away — a leader or company
    gets more effective output by transferring real discretion to others than
    by retaining control at the center.

- from: advice-process
  verb: instantiates
  to: power-sharing-paradox
  why: >-
    Letting anyone decide alone after seeking advice is a concrete mechanism
    for the paradox that giving away formal decision authority increases,
    rather than dilutes, an organization's real power.

- from: first-move-trust-reciprocity
  verb: extends
  to: vulnerability-based-trust
  why: >-
    Vulnerability-based-trust names the state teams need; first-move-trust-reciprocity
    supplies the missing engine — someone must risk exposure first, unearned,
    to invoke the reciprocity norm that produces it.

- from: vulnerability-based-trust
  verb: instantiates
  to: vulnerability-as-courage
  why: >-
    A team's trust in teammates admitting weakness without punishment is the
    organizational-scale case of vulnerability functioning as the origin of
    connection rather than as exposure to be avoided.

- from: pygmalion-leadership-expectations
  verb: extends
  to: inner-work-life-effect
  why: >-
    Inner-work-life-effect measures that a positive internal state lifts
    performance; pygmalion expectations supplies the upstream cause — a
    leader's genuine belief shapes the treatment that produces that state.

- from: safe-to-fail-practice-environment
  verb: tempers
  to: safe-to-fail-experiments
  why: >-
    Practice-environment's requirement of true backtrack-to-any-past-state
    reveals that most organizational safe-to-fail probes are only partly
    reversible — their safety is probabilistic, not the guaranteed undo this names.

- from: disposable-prototypes
  verb: instantiates
  to: safe-to-fail-experiments
  why: >-
    A throwaway facade built only to answer one question, at the lowest
    fidelity that will do it, is the product-design case of a small,
    reversible probe sized so failure costs almost nothing.

- from: fail-fast-safely
  verb: parallels
  to: safe-to-fail-experiments
  why: >-
    Both reframe failure from accident to instrument — surfaced early and
    made cheap on purpose — as the actual mechanism by which an organization
    learns what a novel or complex system will do.

- from: polarity-mapping
  verb: contradicts
  to: evaporating-cloud
  why: >-
    Evaporating-cloud dissolves a stuck conflict by finding and invalidating
    a hidden assumption; polarity-mapping insists some tensions have no such
    assumption to remove and must be managed as permanent oscillation instead.

- from: polarity-mapping
  verb: extends
  to: solve-resolve-dissolve
  why: >-
    Solve, resolve, or dissolve exhausts the ways to end a problem once;
    polarity-mapping adds a fourth mode for tensions that are not one-time
    problems at all — manage the oscillation, since it cannot be closed.

- from: powerful-questions
  verb: parallels
  to: clean-language-questions
  why: >-
    Both derive their power from the asker suppressing their own agenda —
    powerful-questions by holding no answer in mind, clean-language by using
    almost none of their own words — so the other person does the thinking.

- from: the-righting-reflex
  verb: tempers
  to: coach-mentor-duality
  why: >-
    The righting-reflex names exactly the failure mode lurking in the
    duality's mentoring half — reaching for your own experience-built fix
    solves the wrong problem, because it was never built from theirs.

- from: the-righting-reflex
  verb: tempers
  to: advice-process
  why: >-
    Advice-process treats seeking others' input as due diligence for a
    decision; the-righting-reflex warns that advice built from the advisor's
    own experience routinely answers a question the receiver never asked.

- from: metaphor-landscape
  verb: parallels
  to: mental-models
  why: >-
    Both claim a mostly-unconscious internal representational system —
    metaphor or mental model — silently determines what a person can
    perceive and do, and both treat surfacing it as the lever for change.

- from: ironic-process-theory
  verb: parallels
  to: shadow-integration
  why: >-
    Both describe the same trap — actively denying or pushing away unwanted
    mental content doesn't erase it but guarantees its return in a more
    distorted, harder-to-control form; ironic-process-theory locates this in
    conscious suppression's own monitoring loop, shadow-integration in the
    unconscious's accumulating pressure, but both conclude that the act of
    denial is what manufactures the eventual, involuntary resurfacing.

- from: goalodicy
  verb: parallels
  to: asset-debt
  why: >-
    Both show a past commitment — an identity-fused goal, an unretired asset
    — quietly flipping from investment to trap, defended past the point of
    value because abandoning it feels like losing rather than saving.

- from: iterate-or-exit
  verb: tempers
  to: goalodicy
  why: >-
    Goalodicy survives contradicting evidence by reinterpreting it as reason
    to invest harder; iterate-or-exit's forced written recycle-or-advance
    checkpoint is the structural mechanism built to block exactly that move.

- from: memento-mori-practice
  verb: contradicts
  to: death-denial
  why: >-
    Death-denial holds that mortality is managed by exhausting substitute
    pursuits of permanence; memento-mori-practice argues the opposite —
    ritually keeping death visible converts dread into vitality, not despair.

- from: shame-vs-guilt
  verb: parallels
  to: no-judgment-accountability
  why: >-
    Both show the identical lapse producing repair or collapse depending
    purely on self-talk framing — "I did a bad thing" that triggers
    correction, versus "I am bad" or "I am blamed" that triggers hiding.

- from: temporal-landmarks
  verb: parallels
  to: habit-vulnerability-windows
  why: >-
    Both locate a psychologically distinct window — a calendar date, a life
    transition — where old patterns loosen their grip and a new commitment
    can take root far more easily than at any ordinary moment.

- from: daily-oscillation
  verb: parallels
  to: coaching-intervention-rhythm
  why: >-
    Both claim the same action lands differently depending on where in a
    natural cycle it falls — matching effort to the system's own peak,
    trough, or cycle-boundary multiplies its effect over applying it evenly.

- from: target-condition
  verb: tempers
  to: fuzzy-goals
  why: >-
    Target-condition's demand for a sharp, non-negotiable state names the
    known-process, incremental-step context where fuzzy-goals' deliberate
    vagueness would leave effort undirected instead of creatively open.
