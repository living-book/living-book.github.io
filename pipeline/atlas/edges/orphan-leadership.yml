# Lens: Leadership & Coaching orphans (24 zero-edge concepts) woven outward
# into the rest of the catalog. Cross-domain strongly preferred.

- from: the-hidden
  verb: instantiates
  to: observer-relative-systems
  why: >-
    Catmull's claim that organizations structurally cannot see certain problems
    is a concrete case of Weinberg's principle that a system is never given
    whole, only constructed by an observer's chosen distinctions — whatever
    lies outside that chosen frame is invisible by construction, not neglect.

- from: five-step-process
  verb: parallels
  to: five-questions
  why: >-
    Both compress an entire improvement cycle into a fixed, ordered sequence —
    state the goal, diagnose the gap, then act — and insist the steps run one
    at a time, feeding results back into the next round instead of letting
    diagnosis and solution blur together.

- from: pain-plus-reflection
  verb: parallels
  to: downward-spiral
  why: >-
    Both locate the real damage in the response to a failure, not the failure
    itself — Waitzkin shows refusing to accept the first mistake compounds it
    through panic, and Dalio shows refusing to reflect on pain forfeits
    exactly the lesson it was signaling.

- from: catalyst-factor
  verb: parallels
  to: kaizen-culture
  why: >-
    Both find that surfacing problems early requires making the cost of
    admitting them low — Amabile's "learning from problems" catalyst needs
    psychological safety, and Kanban's kaizen culture needs trust that
    proposing a fix won't be punished, or neither improvement loop starts.

- from: inner-work-life-effect
  verb: parallels
  to: goldilocks-rule
  why: >-
    Both treat momentary motivational state, not effort or trait, as the
    actual performance lever — Amabile's diary data shows day-to-day mood
    causally drives output, and the Goldilocks Rule shows that same
    peak-motivation state is produced by recalibrating difficulty to ability.

- from: inner-work-life
  verb: parallels
  to: craving-brain
  why: >-
    Both locate the real driver of behavior in a mostly hidden, event-
    triggered internal stream rather than a fixed trait — Duhigg's craving is
    generated anew by each cue before the routine runs, and inner work life
    shifts hour to hour with workplace events.

- from: nourishment-factor
  verb: parallels
  to: conversation-centric-communication
  why: >-
    Both insist only affect-carrying, personal signals sustain connection —
    respect and emotional support delivered face-to-face, voice and facial
    cues — while logistics-only substitutes, however frequent, don't count
    toward the relationship or the motivation it produces.

- from: jobs-to-be-done
  verb: formalizes
  to: create-a-customer
  why: >-
    Drucker says purpose means asking what the customer wants to buy, not
    what you want to sell; Jobs to Be Done turns that question into a
    measurable unit — the customer's underlying job and success criteria —
    that can be researched and designed against directly.

- from: focus-on-contribution
  verb: parallels
  to: outcome-over-output
  why: >-
    Both name the same substitution trap — mistaking effort, headcount, or
    shipped features, which are cheap to observe, for the actual contribution
    or outcome they were meant to produce — and redirect attention from the
    cost side of the ledger to the result.

- from: knowledge-worker-as-volunteer
  verb: parallels
  to: empowered-product-teams
  why: >-
    Both argue command-and-control tasking fails on people who own the real
    asset — their expertise — and can walk away with it: Drucker's volunteer
    analogy and Cagan's "missionaries not mercenaries" teams each substitute
    mission and autonomy for hierarchy as the true motivator.

- from: leadership-as-work
  verb: parallels
  to: kata
  why: >-
    Both strip an admired capability of its mystique: Drucker shows effective
    leadership is mundane, repeatable work — defining mission, setting
    standards — uncorrelated with personality, and Rother shows skilled
    improvement is a practiced, content-neutral routine, not an innate gift.

- from: masterly-intuition
  verb: tempers
  to: leadership-as-work
  why: >-
    Drucker frames leadership as explicit, learnable work with no dependence
    on innate gift; masterly intuition shows that past genuine mastery,
    effective judgment stops running through explicit steps at all — naming
    exactly the condition under which Drucker's procedural model runs out.

- from: picking-people
  verb: parallels
  to: discipline-as-professional-virtue
  why: >-
    Both replace faith in individual gift with discipline in following a
    defined procedure — Drucker's five-step hiring process and Gawande's
    fourth professional virtue each convert an unreliable judgment call into
    one solved by consistent process, not talent.

- from: clarity-over-consensus
  verb: parallels
  to: fair-process
  why: >-
    Both separate commitment from agreement — Lencioni's teams commit once
    everyone was heard and one clear call is made, Roberto's fair process
    shows people cooperate with a decision that felt legitimate even after
    losing the argument; buy-in tracks fairness, not favorability.

- from: peer-based-accountability
  verb: parallels
  to: andon
  why: >-
    Both move enforcement to whoever is closest to the problem instead of a
    supervisor — Toyota's andon lets any line worker stop production the
    instant a defect appears, and peer accountability lets any teammate call
    out a lapse directly, since immediate lateral correction beats hierarchy.

- from: status-vs-results
  verb: parallels
  to: proxy-metrics-trap
  why: >-
    Both name the same substitution — a proxy for success, whether activity
    metrics or the prestige of belonging to a team, quietly replaces the
    actual outcome as what people optimize for, letting a group feel
    successful precisely while its real purpose goes unaddressed.

- from: authenticity-trap
  verb: contradicts
  to: identity-based-habits
  why: >-
    Clear argues durable change requires deciding your identity first and
    then acting from it; Ibarra shows a genuine leadership transition
    requires acting into an unfamiliar role before identity catches up, and
    insisting on staying "true" to your existing self-concept blocks it.

- from: competency-trap
  verb: parallels
  to: performance-oversupply
  why: >-
    Both describe overinvestment in an already-adequate strength — a drive's
    continued capacity gains stop earning a premium once they outpace what
    the market needs, and a manager's continued mastery of an
    already-successful skill stops earning advancement once demands move on.

- from: competency-trap
  verb: tempers
  to: marginal-gains-compounding
  why: >-
    Marginal gains assumes compounding daily investment in what you already
    do reliably compounds into advantage; competency trap shows that same
    compounding backfires once a role's real demands shift to a different
    skill — the improvement that built success now compounds irrelevance.

- from: connective-advantage
  verb: instantiates
  to: betweenness
  why: >-
    McGilchrist argues reality is often constituted between things, not
    within either party alone; connective advantage is a concrete case —
    Ibarra's network-quality measure treats a leader's actual capability as
    living in the network's structure, not in any individual trait.

- from: do-it-yourself-transition
  verb: tempers
  to: habit-vulnerability-windows
  why: >-
    Duhigg's window opens because a dramatic life transition visibly signals
    it's time for new patterns; Ibarra shows role demands can shift gradually
    with no such visible trigger, so the window never opens on its own and
    the person must manufacture the transition deliberately.

- from: stepping-up-process
  verb: parallels
  to: desirable-difficulties
  why: >-
    Both reframe struggle mid-process as functional, not a warning sign —
    spacing and interleaving make learning durable through friction, and the
    exhausting "complication" stage of backsliding between old and new roles
    is what makes an identity change internalize rather than evaporate.

- from: culture-of-no-yes-maybe
  verb: instantiates
  to: evolved-vs-designed-rules
  why: >-
    IBM's "nonconcur" veto culture wasn't designed, it accreted through
    unguided practice until a whole coordinator role calcified around it — a
    concrete case of evolved rules becoming effective but entrenched and
    nearly impossible to question, unlike rules deliberately crafted.

- from: incremental-closure
  verb: parallels
  to: set-based-development
  why: >-
    Both resist committing on argument alone — Eisenhower's incremental
    closure locks in only sub-decisions where genuine common ground has
    already emerged, and set-based development carries multiple options
    forward until real feedback, not the most persuasive voice, decides.

- from: leading-with-restraint
  verb: parallels
  to: meta-cognitive-control
  why: >-
    Both isolate control of process from control of content — de Bono's Blue
    Hat sequences which mode of thinking runs next without supplying the
    conclusion, and Roberto's restrained leader directs how a decision gets
    made while deliberately withholding a preferred answer until others speak.
