# Lens: EMOTION, MIND & TEAM DYNAMICS
# Anchor books: emotional-agility, emotional-intelligence-2-0, boundaries, clarity,
# fearless-simplicity, hbr-effective-communication, overcoming-five-dysfunctions,
# managing-virtual-teams

- from: sowing-and-reaping
  verb: instantiates
  to: iatrogenics
  why: >-
    Rescuing someone from a consequence they need to face is a concrete case
    of an intervention meant to help causing hidden, delayed harm by severing
    the feedback loop that consequences supply for real learning.

- from: runaway-narrowing
  verb: parallels
  to: getting-hooked
  why: >-
    Both describe a self-reinforcing loop where a narrow, assertive mode of
    engaging a thought or emotion entrenches itself instead of triggering the
    corrective swing back toward broader, balanced perspective.

- from: mind-essence-vs-discursive-mind
  verb: parallels
  to: two-modes-of-attention
  why: >-
    Both distinguish an open, non-conceptual awareness from a narrow,
    conceptualizing mode that mistakes its own constructed representations
    for reality — rigpa vs. sem, or right- vs. left-hemisphere attention —
    with narrowness treated not as a separate faculty to eliminate but as a
    failure to recognize the wider awareness that was already present.

- from: emotion-liberation
  verb: tempers
  to: stepping-out
  why: >-
    Names the condition under which the effortful step-back-and-observe
    technique is unnecessary scaffolding: direct recognition of awareness's
    open nature already liberates a difficult emotion the instant it's met,
    with no deliberate distancing maneuver required.

- from: trust-foundations
  verb: parallels
  to: type-ii-emergent-properties
  why: >-
    Both treat trust as a whole-system property that cannot be stored or
    banked once earned — it exists only while the generating interactions
    (fairness, competence, predictability, candor) keep actively running, and
    lapses the instant they stop.

- from: responsible-to-not-for
  verb: parallels
  to: control-influence-appreciate
  why: >-
    Both insist effective action starts by correctly sorting what falls under
    your direct control from what you can only influence or must simply
    accept, since treating another's domain as controllable produces false
    responsibility and burnout.

- from: eq-measurement-and-feedback
  verb: parallels
  to: measurement-as-uncertainty-reduction
  why: >-
    Both reframe a seemingly intangible target as measurable — not by
    achieving perfect certainty but by using a structured assessment to
    reduce uncertainty enough to decide which specific skill is worth
    developing next.

- from: team-scoreboard
  verb: parallels
  to: metrics-feedback-loop
  why: >-
    Both replace opinion-based judgment of team performance with a small set
    of continuously reviewed, visible metrics that trigger course-correction,
    treating the shared display itself as the mechanism that closes the
    feedback loop.

- from: thematic-goal-workshop
  verb: tempers
  to: objectives-and-key-results
  why: >-
    Names the gap OKRs leave even when followed well: each team's Objective is
    meant to be qualitative and inspirational, but that qualitative anchor is
    set per team, not shared company-wide — without one single, non-quantitative
    rallying cry spanning every team, multiple well-formed, independently-set
    OKRs still pull competing priorities in different directions when
    resources are scarce.

- from: conflict-resolution-model
  verb: extends
  to: constructive-conflict
  why: >-
    Constructive-conflict separates substantive disagreement from
    interpersonal conflict; conflict-resolution-model adds the mechanism
    explaining why supposedly substantive disagreements keep sliding into
    personal ones — four distinct obstacle classes hiding beneath the issue.

- from: team-effectiveness-exercise
  verb: instantiates
  to: meeting-functions
  why: >-
    The structured peer-feedback session is a concrete case of a meeting
    doing its real work — building shared knowledge and creating commitment —
    the functions meeting-functions argues meetings exist for beyond pure
    information transfer.

- from: distributed-autonomy-with-trust
  verb: instantiates
  to: trust-foundations
  why: >-
    Granting autonomous decision-making across time zones is a concrete case
    of the general claim: leaders who cannot rely on real-time supervision
    must depend on the trust relationship trust-foundations defines —
    fairness, competence, predictability, candor — because those foundations,
    not proximity or oversight, are what let real decision authority be
    delegated across time zones.

- from: implicit-norms-made-explicit
  verb: parallels
  to: information-bonded-systems
  why: >-
    Both identify shared culture, not physical proximity or mechanical
    linkage, as the real binding medium of a social system, and both note
    that when it can't form by osmosis it must be deliberately written down
    instead.

- from: organizational-defensive-routines
  verb: tempers
  to: mental-models
  why: >-
    A group's skilled avoidance of threatening topics — undiscussable issues
    everyone tacitly agrees not to raise — blocks exactly the reflection and
    inquiry that mental-models says is required to surface and test the tacit
    images driving behavior.

- from: tiny-tweaks-principle
  verb: parallels
  to: reverse-conway-maneuver
  why: >-
    Both deliberately engineer the surrounding structure upstream —
    environmental cues, team boundaries — so the desired downstream behavior
    emerges as the path of least resistance, rather than relying on willpower
    or persuasion in the moment.

- from: walking-your-why
  verb: parallels
  to: purpose-driven-leadership
  why: >-
    Both insist purpose is a continuous direction to keep walking toward, not
    a fixed destination to reach and check off, so treating purpose as
    arrived-at is a category error in either framework.

- from: boundary-violators-taxonomy
  verb: parallels
  to: conflict-profiling
  why: >-
    Both argue a dysfunction isn't uniform: a small typology of underlying
    patterns — violator type, individual conflict style — determines what
    actually resolves it, so a single one-size intervention reliably fails
    most of the group.

- from: emotional-hijacking
  verb: instantiates
  to: system-1-system-2
  why: >-
    The limbic override of prefrontal reasoning under stress is a specific,
    embodied case of System 1's fast automatic processing overriding System
    2's slow deliberate control before conscious thought can intervene.
