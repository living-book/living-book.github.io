# Orphan pass 4 — Leadership & Coaching (75) + Business & Management (3)
# See pipeline/atlas/orphans4/ORPHANS.md for the assigned orphan list.

# --- Business & Management (3/3 linked) ---

- from: jobs-centric-organization
  verb: parallels
  to: product-oriented-management
  why: >-
    Both replace a structural fix (reorganizing, launching projects) with
    realigning funding, metrics, and processes around the true durable unit
    of value — the customer's job, the value stream — that org charts
    otherwise cut across.

- from: wholeness-at-work
  verb: parallels
  to: vulnerability-as-courage
  why: >-
    Both locate hidden energy behind a wall people build around themselves —
    a "professional self," an armor of invulnerability — and claim removing
    that wall, not defending it, is what unlocks connection and capability.

# --- Leadership & Coaching (45 edges after adversarial verification) ---

- from: action-learning-coach
  verb: parallels
  to: servant-leader-scrummaster
  why: >-
    Both roles trade directive authority for a narrower, structurally
    protected power — pausing work for reflection, removing impediments —
    on the premise that solving problems for the group blocks its growth.

- from: clean-coach-capacities
  verb: parallels
  to: negative-capability
  why: >-
    Both name the deliberate suspension of one's own judgment, ego, and
    conclusions as the actual working mechanism that lets someone else's
    more accurate, unresolved reality emerge instead of a premature answer.

- from: clean-coaching-session-design
  verb: parallels
  to: grow-model
  why: >-
    Both move a session through a goal, a reality check, and a landing on
    action, but GROW's own text explicitly separates its concrete,
    coach-facilitated Options step from more free-form approaches — Clean
    Coaching is exactly that free-form alternative, not a case of GROW
    executed with cleaner questions.

- from: directive-bias
  verb: instantiates
  to: the-righting-reflex
  why: >-
    The coach's unconscious drift toward telling solutions is the specific,
    professional-context case of the general reflexive urge to fix another
    person's problem with advice built from one's own experience, not theirs.

- from: listening-to-structure
  verb: parallels
  to: metaphor-landscape
  why: >-
    Both hold that a person's spontaneous language forms one coherent,
    internally consistent system — metaphor or narrative logic — and that
    tracking that system, not the content, is what reveals how beliefs hold.

- from: systems-modeling-coaching
  verb: instantiates
  to: mental-models
  why: >-
    Coaching that maps how a coachee's internal elements relate and
    influence each other is a concrete, one-on-one application of surfacing
    and testing the tacit mental models that shape perception and action.

- from: self-modelling
  verb: parallels
  to: insight-understanding
  why: >-
    Both claim the useful shift is self-generated from within a person's
    own process — not supplied by an outside answer — and that this
    internally-produced insight motivates change more reliably than being told.

- from: coaching-agreement
  verb: instantiates
  to: contracting-wants-and-offers
  why: >-
    The structured up-front agreement on expectations, logistics, and
    confidentiality is a concrete case of stating wants and offers before
    work starts, since skipped expectations resurface later as resentment.

- from: support-and-challenge
  verb: parallels
  to: see-saw-principle
  why: >-
    Both locate productive development at a calibrated balance point between
    two forces — support/comfort and challenge/stretch — where either force
    alone produces either stagnation or overwhelm instead of forward motion.

- from: positive-challenge
  verb: parallels
  to: possible-selves
  why: >-
    Both use an imagined future identity, not past failure, as the lever for
    change — confronting a values-action gap by pointing toward who someone
    could become rather than backward at where they fell short.

- from: self-directed-questioning
  verb: parallels
  to: metacognition
  why: >-
    Both require stepping back to observe your own mind from outside — but
    Maxwell's questions are a periodic values-check against selfishness and
    complacency, while Dispenza's metacognition targets real-time automatic
    reactions for neural rewiring; a shared stance, not the same mechanism.

- from: value-addition-as-practice
  verb: parallels
  to: focus-on-contribution
  why: >-
    Both reject an internal proxy — effort, authority, checking boxes — for
    a question aimed outward: what result or value does this actually
    produce for someone beyond my own function.

- from: level-5-leadership
  verb: parallels
  to: balance-of-opposites
  why: >-
    Both find that reconciling two qualities normally assumed to trade off —
    humility and will, masculine and feminine — rather than choosing one, is
    exactly what produces the exceptional, hard-to-imitate result.

- from: management-vs-leadership
  verb: parallels
  to: smart-vs-healthy
  why: >-
    Both diagnose organizations as systematically over-investing in one of
    two jointly necessary capacities — management/smart, leadership/health —
    while starving its complement, producing chronic imbalance either way.

- from: carriers-vs-catalysts-of-change
  verb: parallels
  to: organizational-autonomy-and-change
  why: >-
    Both distinguish change imposed from outside an organization's own logic
    from change that works with its internal history and readiness, and both
    hold that only the latter actually takes root rather than being rejected.

- from: leadership-configurations
  verb: parallels
  to: behavioral-profiling
  why: >-
    Both map individual differences onto a fixed structural framework — four
    leadership frames, MBTI personality axes — to explain why people clash
    or excel differently, and to make blind spots visible rather than assumed.

- from: personal-best-methodology
  verb: parallels
  to: destiny-experiences
  why: >-
    Both independently arrive at the same case-based-reasoning move —
    collect concrete peak-performance accounts and extract the recurring
    pattern rather than theorizing directly — one at population scale for a
    leadership model, the other for one person's own sense of purpose.

- from: adaptive-leadership
  verb: parallels
  to: mastery-stage-coaching-match
  why: >-
    Both reject one fixed style, instead deriving the correct behavior from
    a situational variable — subordinate maturity, team mastery stage — so
    the same leader or coach must genuinely change approach as that shifts.

- from: authenticity-over-charisma
  verb: parallels
  to: find-your-voice
  why: >-
    Both locate a leader's persuasive power in self-owned, examined
    conviction rather than a performed or borrowed style, treating that
    authenticity — not charisma or eloquence — as the actual trust mechanism.

- from: leader-vulnerability
  verb: instantiates
  to: vulnerability-as-courage
  why: >-
    A leader publicly admitting blind spots is a concrete, high-stakes case
    of the general claim that exposing uncertainty and risk — not projecting
    invulnerability — is what actually generates trust and connection.

- from: master-observer-culture
  verb: parallels
  to: team-interactions-as-organizational-sensing
  why: >-
    Both treat distributed front-line observation and interaction as a
    literal sensing organ — not a metaphor — that feeds fast, anticipatory
    correction back to the whole organization before a crisis forces it.

- from: perpetual-navigation
  verb: parallels
  to: sense-and-respond-steering
  why: >-
    Both replace periodic, forecast-based planning with continuous
    real-time adjustment grounded in present reality as the actual
    mechanism of direction-setting — steering a bicycle, not aiming a cannon.

- from: centralized-collaborative-repository
  verb: tempers
  to: physical-kanban-board
  why: >-
    A tangible wall board as the sole system of record only works when a
    team is co-located; once work is distributed and asynchronous, that
    single source of truth must move online or it silently stops functioning.

- from: explicit-shared-objectives
  verb: parallels
  to: explicit-policies
  why: >-
    Both replace implicit, assumed-shared understanding with deliberately
    written, visible agreements, on the premise that unstated norms fail
    the moment a group can no longer rely on cultural or physical osmosis.

- from: strategic-in-person-moments
  verb: parallels
  to: liftoff
  why: >-
    Both treat an intentionally staged, high-bandwidth gathering as the
    mechanism that overcomes inertia and builds the shared trust which all
    the lower-bandwidth, distributed work afterward then depends on.

- from: temporal-inconvenience-rotation
  verb: parallels
  to: shared-pain-shared-gain
  why: >-
    Both distribute an unavoidable cost — inconvenient hours, overrun costs —
    equally across parties on a rotating or shared basis, rather than
    letting it fall permanently on whoever has the least power to refuse it.

- from: chief-motivational-officer
  verb: parallels
  to: intrinsic-motivation-framework
  why: >-
    Both single out connecting people to purpose as what actually motivates
    — Baker's Purpose driver names why it works, and the CMO mindset makes
    living out that connection a leader's primary daily job rather than a
    message delivered occasionally; neither concept's autonomy or mastery
    legs are addressed by the other.

- from: personal-connection-leadership
  verb: parallels
  to: care-as-differentiator
  why: >-
    Both claim genuine individual care and attention — not technique or
    charisma — is the actual differentiator that motivates people and
    attracts loyalty, in a world where most leaders default to distance.

- from: story-driven-change
  verb: parallels
  to: springboard-story
  why: >-
    Both treat story as the actual mechanism for driving change, not
    decoration on top of an argument — but they prescribe opposite tactics:
    Bates builds richly detailed, fully-narrated stories, while Denning's
    springboard story is deliberately sparse so the listener's own
    imagination, not the speaker's detail, does the persuading.

- from: self-organizing-agenda
  verb: parallels
  to: self-organizing-teams
  why: >-
    Both replace top-down assignment — of session topics or of sprint tasks —
    with participant self-selection as the actual mechanism that produces
    commitment and a coherent outcome no single organizer could have planned.

- from: commitment-clarification-cascading-communication
  verb: instantiates
  to: cascading-communication
  why: >-
    Writing agreements down, then relaying them in person within 24-48
    hours, is the concrete two-part mechanism for exactly the phenomenon
    named generally: clarity spreading as word-of-mouth from leaders down.

- from: personal-histories-exercise
  verb: instantiates
  to: vulnerability-based-trust
  why: >-
    Sharing origins, sibling order, and childhood challenges is the specific
    structured exercise that produces vulnerability-based trust: mutual
    understanding built on admitted weakness, not predicted competence.

- from: cyclonic-strategic-thinking
  verb: parallels
  to: five-step-process
  why: >-
    Both replace a vague, informally-understood planning process with a
    fixed sequence of distinct phases running from abstract intent down to
    concrete execution, forcing an organization to speak one process language.

- from: priority-management
  verb: instantiates
  to: importance-not-urgent
  why: >-
    The daily A/B-ranking and protected-time discipline is a concrete
    operationalization of Drucker's distinction between what is truly
    important and what merely feels urgent, applied task by task, day by day.

- from: redefining
  verb: instantiates
  to: problem-formulation-shapes-solutions
  why: >-
    The Challenge-Should-What-Would-It-Take sequence is a concrete three-step
    technique for exactly the decisive move problem-formulation-shapes-solutions
    names: how a problem gets framed determines which solutions are visible.

- from: rethinking
  verb: parallels
  to: idea-destruction
  why: >-
    Both frame deliberately challenging and discarding one's own settled
    beliefs as a trainable discipline that must be practiced against
    resistance, not a passive open-mindedness trait some people just have.

- from: failure-as-gift
  verb: parallels
  to: resilience-reframing
  why: >-
    Both convert setback into instrumental material — a teacher, a puzzle —
    through a deliberate reframe, treating failure as reinterpretable
    stepping-stone data rather than a verdict on the person who experienced it.

- from: oars-reflective-listening
  verb: formalizes
  to: active-listening
  why: >-
    Active listening's vague "shut down your internal voice, genuinely
    hear" claim gets a concrete, teachable four-microskill structure here —
    reflection tested and corrected one exchange at a time, not just
    attentive silence.

- from: executive-presence
  verb: parallels
  to: calm-assertive-presence
  why: >-
    Both hold that a small, learnable set of observable physical cues —
    posture, steady eye contact, unhurried movement — not underlying
    competence itself, is what produces the perception of leadership capability.

- from: me-inc
  verb: parallels
  to: customer-value-identification
  why: >-
    Both apply a business lens to individual work — treating a career or a
    job as an enterprise with customers and value streams — rather than
    accepting job titles and tasks as the natural unit of self-management.

- from: sugar-grain-principle
  verb: parallels
  to: tiny-tweaks-principle
  why: >-
    Both reject willpower-driven overhaul for small, deliberately engineered
    interventions — gradual, imperceptible increments in one case, redesigned
    environmental defaults in the other — that make values-aligned change
    stick without triggering the resistance a sweeping change would.

- from: continuity-change-continuum
  verb: parallels
  to: dichotomy-to-complementarity
  why: >-
    Both refuse to force continuity and change (or stability and dynamism)
    onto one zero-sum axis — Drucker's own examples call for both running
    high at once, the same complementary move Gharajedaghi names, though
    Drucker's "continuum" language is looser than Gharajedaghi's explicit
    two-independent-dimensions model.

- from: success-to-significance
  verb: parallels
  to: socioemotional-selectivity
  why: >-
    Both describe how an approaching time horizon — career's second half,
    life's felt ending — systematically redirects motivation away from
    acquisitive, self-focused goals toward a narrower, more meaningful set.

- from: succession-organizational-spirit
  verb: parallels
  to: anchoring-change-in-culture
  why: >-
    Both hold that what actually survives a transition — a new leader, a new
    behavior — is not the formal change itself but whether its spirit was
    rebuilt into the selection criteria and structures that sustain it.

- from: unique-contribution
  verb: parallels
  to: the-element
  why: >-
    Both argue exceptional outcomes come from the narrow zone of genuine
    distinctive fit — where unique position or where aptitude meets
    passion — not from being merely competent or diligent in a broad area.
