- from: percent-complete-and-accurate
  verb: tempers
  to: flow-efficiency
  why: >-
    Flow efficiency scores a stream purely by active-versus-waiting time,
    blind to whether that active time produced correct work; a step can be
    time-efficient yet still compound low-quality output, since rework loops
    never register as waiting.

- from: mapping-altitude
  verb: parallels
  to: leverage
  why: >-
    Both insist the obvious fix visible from inside one process step is
    usually the wrong one — real leverage, like a value stream's macro view,
    sits at a nonobvious structural point invisible until you deliberately
    step back from local detail.

- from: existential-overhead
  verb: parallels
  to: inner-work-life
  why: >-
    Both name a continuous, mostly hidden internal stream — unfinished-work
    anxiety, or moment-to-moment emotion — that silently drives effectiveness
    independent of, and often more than, the visible task itself.

- from: existential-overhead
  verb: parallels
  to: solitude-deprivation
  why: >-
    Both describe an invisible background cognitive load that compounds by
    default and lifts only through deliberate action — externalizing
    unfinished work onto a board, or deliberately unplugging from other
    minds' input.

- from: shuhari-learning-stages
  verb: parallels
  to: dreyfus-model-skill-acquisition
  why: >-
    Both hold that skill moves through a small number of qualitatively
    distinct stages where the kind of guidance needed changes at each one,
    so the same fixed instruction helps at one stage and cripples another.

- from: mastery-stage-coaching-match
  verb: parallels
  to: shuhari-learning-stages
  why: >-
    Both apply the identical Shu-Ha-Ri progression to coaching, insisting the
    coach diagnose which stage a practice is at before choosing how to
    intervene, since a style fit for Shu actively harms a team at Ri.

- from: kata
  verb: parallels
  to: dreyfus-model-skill-acquisition
  why: >-
    Both reject explained content as sufficient for changing behavior: kata
    locates the transmissible part in a practiced, content-neutral routine,
    and Dreyfus shows a uniform rule imposed regardless of skill stage
    actively degrades an expert's performance.

- from: testing-as-sampling
  verb: parallels
  to: black-box-limits
  why: >-
    Both hold that finite observation can never certify completeness — a
    test suite samples an effectively infinite space of possible checks,
    just as a black box's observed behavior is only ever consistent with a
    model, never uniquely confirming it.

- from: information-immunity
  verb: parallels
  to: self-image-defense
  why: >-
    Both describe an unconscious filter — repression, rationalization,
    projection, or a defended self-story — that blocks threatening
    information from ever being weighed on its merits, whenever it
    threatens a self-image the person needs intact.

- from: information-value-of-testing
  verb: parallels
  to: expected-value-of-information
  why: >-
    Both reduce information's worth to one question: would it change a
    decision? Testing that can't alter what anyone does is worthless, and
    information's economic value equals only the expected opportunity-loss
    its uncertainty reduction would avoid.

- from: living-documentation
  verb: instantiates
  to: knowledge-in-the-world
  why: >-
    An executable specification that fails the moment reality drifts is a
    concrete case of putting correctness-knowledge into the environment
    instead of requiring people to remember and manually keep documentation
    true.

- from: key-examples
  verb: parallels
  to: exemplar
  why: >-
    Both hold that concrete, specific instances — a worked example, a
    solved paradigm-defining problem — train shared judgment and expose
    ambiguity that abstract rules or definitions leave hidden, and community
    coherence rests on these instances, not stated rules.

- from: done-done
  verb: parallels
  to: percent-complete-and-accurate
  why: >-
    Both refuse any relaxation of a completion or quality claim: "done done"
    breaks if anything is left unfinished, and percent-complete-and-accurate
    breaks if a defect is silently absorbed downstream instead of
    attributed to its source.

- from: hero-culture-magical-thinking
  verb: parallels
  to: premature-scaling
  why: >-
    Both describe an organization mistaking an unsustainable practice for
    free capacity — heroics absorbing workload, or hiring against an
    unverified plan — until the hidden, compounding cost surfaces as a
    sudden collapse rather than a gradual one.

- from: productivity-vs-effectiveness
  verb: tempers
  to: hero-culture-magical-thinking
  why: >-
    Separating doing-a-lot from doing-it-well from doing-the-right-thing
    shows exactly why hero-culture's lesson is confused: heroics reward raw
    output, the wrong axis, and mistaking it for effectiveness is what hides
    the debt until velocity collapses.

- from: risk-of-replacement-grid
  verb: formalizes
  to: jobs-vs-tasks
  why: >-
    Jobs-vs-tasks claims automation forecasts fail by treating a job as one
    atomic unit; the risk-of-replacement grid turns that claim into a
    measurable two-axis test — optimization versus creativity, asocial
    versus social — for exactly which tasks survive.

- from: syntactic-brittleness
  verb: parallels
  to: complexity-beyond-memory
  why: >-
    Both name a system with no graceful-degradation margin: a formal
    rule-system fails completely from one misplaced symbol, and an expert
    mind past a complexity threshold can no longer reliably hold every
    necessary step, however well trained.

- from: inner-game-awareness
  verb: parallels
  to: powerful-questions
  why: >-
    Both replace direct transmission with a channel that lets the other
    person's own noticing do the work — nonjudgmental situational awareness
    over verbal instruction, or an open question held without an answer in
    mind over a directive one.

- from: safe-to-fail-practice-environment
  verb: parallels
  to: set-based-development
  why: >-
    Both defer commitment by engineering reversibility into the process
    itself — backtracking to any past state during practice, or carrying
    multiple design options forward — so real feedback, not upfront
    reasoning, decides what to keep.

- from: testing-as-sampling
  verb: tempers
  to: continuous-validation
  why: >-
    Continuous validation's every-change re-run catches drift fast, but
    testing-as-sampling names its limit: an executable spec still samples a
    finite slice of an infinite behavior space, so passing it certifies
    consistency with chosen examples, never completeness.

- from: pressure-kills-cognition
  verb: parallels
  to: context-switching-tax
  why: >-
    Both uncover a hidden cognitive cost larger than intuition assumes —
    deadline pressure suppresses creativity for days after it lifts, and
    task-juggling imposes overhead the CPU-scheduling metaphor undersells —
    degrading the very capacity each practice presumes it protects.

- from: coach-mentor-duality
  verb: parallels
  to: inner-game-awareness
  why: >-
    Both name the same tension in developing someone else — drawing out
    their own answer through awareness versus transferring your own
    expertise directly — and effective development requires deliberately
    choosing between the two, not defaulting to instruction.

- from: pragmatic-investment-plan
  verb: parallels
  to: flow-distribution
  why: >-
    Both insist a scarce resource — personal learning time, or a team's
    delivery capacity — must be allocated across categories by a
    deliberate, reviewed policy, not left as the unconscious byproduct of
    whatever feels urgent that day.
