- from: symbolic-space
  verb: extends
  to: the-map-mistaken-for-the-world
  why: >-
    McGilchrist's danger is that a workable representation, being more graspable than the
    living original, quietly replaces it as "reality." Clean Language's discipline — never
    move, interpret, or occupy a client's spatial metaphor — names exactly where that
    substitution enters live facilitation and builds the antidote directly into practice.

- from: destiny-experiences
  verb: parallels
  to: exemplar
  why: >-
    Kuhn's physicists converge on how to handle a new problem by pattern-matching against
    worked exemplars, not by reciting a rule they can't state; Stoltzfus's method finds a
    person's purpose the same way — comparing several concrete peak-performance instances
    for what recurs, never by asking the abstract question directly.

- from: four-lenses-of-perspective
  verb: parallels
  to: categories-of-legitimate-reservation
  why: >-
    Both replace a single vague complaint ("I've lost perspective," "I disagree") with a
    fixed, named checklist of the distinct ways it can actually be failing, so the response
    is a specific corrective question aimed at the diagnosed category instead of one
    generic intervention applied to an unspecified problem.

- from: authenticity-trap
  verb: tempers
  to: find-your-voice
  why: >-
    Find Your Voice makes articulating stable personal values a prerequisite for credible
    leading. Ibarra shows the trap this invites: mistaking comfortable past style for that
    voice. Her fix — anchor identity in values while style adapts freely — is find-your-voice
    done right, so the trap tempers a literalist reading that would block growth in its name.

- from: ambivalence
  verb: parallels
  to: polarity-mapping
  why: >-
    MI treats simultaneous for-and-against feelings as normal terrain to work with, not a
    problem to resolve; polarity mapping makes the identical move at the organizational
    level, treating tensions like autonomy-versus-control as permanent oscillations to
    manage rather than problems with a single correct, final answer.

- from: oars-reflective-listening
  verb: parallels
  to: perception-pipeline
  why: >-
    Gordon's model traces meaning through four transitions — thought, spoken, heard,
    interpreted — where each step can distort; Weinberg's four stages — intake, meaning,
    significance, response — trace the identical kind of chained, selective distortion in
    any observation, which is why both fixes require closing a loop back to the source.

- from: picking-the-flowers
  verb: parallels
  to: asymmetric-feedback
  why: >-
    Reinertsen argues feedback should widen a payoff's asymmetry — truncate losses, extend
    gains — rather than merely dampen variation toward a neutral target; MI's practitioner
    does the same to ambivalent speech, selectively amplifying the change-talk thread while
    minimizing sustain-talk, because even-handed reflection just re-grooves the stuck state.

- from: sustain-talk-and-resistance
  verb: parallels
  to: systemic-silence
  why: >-
    Both reframe what looks like an individual failing — client resistance, employee
    silence — as manufactured by the other party's behavior: practitioner pressure produces
    resistance the way hierarchy and protocol produce silence, so the fix targets one's own
    or the structure's behavior, not the "resistant" or "silent" person.

- from: law-of-two-feet
  verb: parallels
  to: whose-problem-is-it
  why: >-
    Owen shifts a conversation's value onto whoever is in the room, not the convener;
    Weinberg's rule ties a problem's ownership to whoever can act — stepping back if they
    already can, engineering exposure if they can't yet feel it — fitting responsibility to
    capacity, not formal role.

- from: whole-system-in-the-room
  verb: tempers
  to: dialogue-decision-process
  why: >-
    DDP's fix for bad group decisions is structural separation — a project team that builds
    alternatives, a decision board that chooses, connected through staged meetings. Owen's
    case shows that separation is scaffolding for absent authority: when every decider is
    physically present, the staged approval sequence collapses because it already happened live.

- from: calm-assertive-presence
  verb: parallels
  to: architecture-speaks
  why: >-
    De Botton argues buildings are read the way faces are read, projecting character from
    minimal formal cues regardless of an architect's stated intent; Denning's leaders are
    read the identical way through body language, and when the nonverbal "form" conflicts
    with the verbal content, audiences trust the form, not the argument.

- from: self-complexity
  verb: parallels
  to: organizational-paradigms
  why: >-
    Both draw on Kegan's adult-development stage theory, applied at different scales:
    self-complexity says a leader's "form of mind" — not skill or mindset — gates what
    ambiguity they can perceive at all; Laloux's color-coded stages say an organization's
    developmental stage gates what structural breakthrough it can actually sustain.

- from: coaching-kata
  verb: instantiates
  to: basic-vs-developmental-facilitation
  why: >-
    Schwarz's developmental mode shares responsibility with the group and teaches process
    skill so dependence decreases over time, instead of just solving today's problem.
    Toyota's mentor/mentee "catch" dialogue is a concrete, decade-long working version of
    exactly that mode: guided struggle on real work, never solving it for the mentee.

- from: behavioral-ground-rules
  verb: parallels
  to: quality-attribute-scenario
  why: >-
    Both convert an unfalsifiable abstraction — "be respectful," "be fast" — into a fixed,
    specific template two independent observers could check: nine watchable behaviors for
    a value, a six-part source-stimulus-response form for a quality goal, because the
    abstraction alone gives everyone something to agree with and nothing to act on.

- from: group-effectiveness-model
  verb: parallels
  to: smart-vs-healthy
  why: >-
    Lencioni argues most leaders pour effort into smart decisions and treat health as a soft
    afterthought, even though neglecting it eventually degrades the smart half too. Schwarz's
    model makes the identical claim more granular: performance alone is not effectiveness,
    and unattended process or personal decay drags performance down over time.

- from: smart-trust-matrix
  verb: parallels
  to: balance-of-opposites
  why: >-
    De Botton's mature buildings integrate two qualities assumed to trade off — luxury and
    simplicity — rather than averaging them into blandness. Smart Trust does the same to
    trust itself: not a compromise between blind trust and distrust, but propensity and
    analysis both maximized at once, which is what makes it a third alternative, not a midpoint.

- from: chinese-room-argument
  verb: parallels
  to: explanatory-creativity
  why: >-
    Searle shows correct symbol manipulation can produce fluent output with zero
    understanding; Deutsch makes the same cut for AI generally — a system recombining
    pre-built knowledge can produce convincing output while creating no new explanatory
    knowledge, because the knowledge in its output originated in the programmer, not the program.

- from: distributed-representation
  verb: extends
  to: distributed-representation-pdp
  why: >-
    Rumelhart's PDP claim — meaning lives in a pattern of microfeature activation, not one
    dedicated unit per concept — is the direct ancestor deep learning builds on: the same
    combinatorial-pattern mechanism, now formalized with an exponential-capacity argument
    and hierarchical composition Rumelhart's original framing didn't have.

- from: intentional-stance
  verb: instantiates
  to: observer-relative-systems
  why: >-
    Weinberg's general claim is that system-hood is constructed by an observer's chosen
    scope and grain, not found in the world. Dennett's intentional stance is a concrete case
    of exactly that: believer-hood is real but strategy-relative, earned by whether treating
    a system as rational actually predicts it, not by any fact discoverable "in" the system.

- from: systematicity-argument
  verb: parallels
  to: good-explanations
  why: >-
    Deutsch says a good explanation's details are locked in place by necessity, not glued on
    for the occasion — a theory that merely permits a pattern explains less than one whose
    structure forces it. Fodor and Pylyshyn apply the identical test to cognitive
    architecture: a network tuned to fit systematicity after the fact hasn't explained it.

- from: turing-test-behavioral-criterion
  verb: tempers
  to: proxy-metrics-trap
  why: >-
    Kersten warns that activity proxies get gamed while their causal link to the real
    outcome quietly breaks. Turing's proxy survives that trap by design: conversation is
    chosen specifically because faking it convincingly requires the underlying competence
    itself, naming the condition under which a behavioral stand-in is trustworthy, not a trap.

- from: quarter-power-scaling
  verb: instantiates
  to: surface-complexity-deep-simplicity
  why: >-
    Gribbin's thesis is that apparently intractable complexity is usually a small number of
    simple components interacting under simple rules. West's single three-quarters-power
    exponent governing both metabolism and city growth is exactly this: one simple scaling
    rule producing the surface complexity of wildly different-looking systems.

- from: the-gray-zone
  verb: tempers
  to: transition-tree
  why: >-
    Transition Tree requires stating, before acting, the specific condition each step must
    create for the next step to depend on. Rother's gray zone names where that requirement
    fails: the territory between current and target condition is not fully visible in
    advance, so it can only be crossed through short observed steps, not verbalized upfront.

- from: meaning-without-morality
  verb: parallels
  to: decisions-vs-outcomes
  why: >-
    Decision Quality insists decisions and outcomes are separate axes people habitually
    conflate, crediting lucky bad decisions and punishing unlucky good ones. Baggini insists
    meaningfulness and morality are the same kind of separable axis, so a life can be
    genuinely meaningful to its owner and still fail a second, independent moral test.
