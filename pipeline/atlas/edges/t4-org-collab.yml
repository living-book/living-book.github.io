- from: structural-fixes-dont-reach-behavior
  verb: tempers
  to: management-model-coherence
  why: >-
    Even a fully coherent, matched set of new structures and rewards fails to
    change behavior if people keep applying the same defensive theory-in-use
    the design was meant to bypass — coherence fixes contradictions between
    practices, not the reasoning pattern underneath them.

- from: one-truth-information
  verb: parallels
  to: radical-transparency
  why: >-
    Both argue that giving everyone the same real information by default beats
    restricting or filtering it, because concealment enables gaming and bad
    decisions more reliably than open information does.

- from: governance-by-boundaries
  verb: parallels
  to: advice-process
  why: >-
    Both replace upfront centralized authorization with bounded
    self-determination — clear principles, or a seek-advice step — trusting
    local judgment to decide freely within limits instead of waiting for
    approval.

- from: decoupling-goals-from-rewards
  verb: parallels
  to: gospel-of-10x
  why: >-
    Both split an ambitious target from the evaluation that follows it — an
    unmeasured aspirational goal, or a basket expected to fail 40% of the time
    — to extract real stretch without triggering gaming.

- from: skilled-incompetence
  verb: parallels
  to: self-image-defense
  why: >-
    Both describe a well-practiced self-protective skill — defensive
    reasoning, or guarding a constructed self-image — that reliably blocks
    accurate self-correction precisely when a threat makes correction most
    needed.

- from: espoused-theory-vs-theory-in-use
  verb: tempers
  to: radical-transparency
  why: >-
    Disclosure policy can only surface what people consciously believe and
    report (espoused theory), not the unconscious theory their behavior
    actually implements, so radical transparency cannot close a gap its
    subject cannot see.

- from: undiscussability-of-undiscussable
  verb: instantiates
  to: how-the-problem-is-managed
  why: >-
    Sealing off a topic and then sealing off the fact that it was sealed off
    is a concrete, extreme case of the general diagnostic principle that how
    an organization manages a problem reveals more than the problem itself.

- from: left-hand-right-hand-case-method
  verb: parallels
  to: diagnosis-intervention-cycle
  why: >-
    Both convert private, unstated inference into a public, testable artifact
    — a transcript paired with withheld thoughts, or an inference made
    explicit and shared — so hidden reasoning can be examined rather than
    acted on invisibly.

- from: mutual-learning-core-values
  verb: extends
  to: model-i-defensive-reasoning
  why: >-
    Schwarz keeps Argyris's Model II values — valid information, informed
    choice, vigilant error-correction — but adds compassion and reframes them
    as a reinforcing cycle rather than a stance adopted only under threat.

- from: leading-with-restraint
  verb: tempers
  to: facilitative-leadership
  why: >-
    Restraint's mechanism is withholding a content position until others have
    spoken, so a facilitative leader who is free to share opinions as they
    arise — since facilitative leadership fuses content-advocacy with
    process-facilitation — can still suppress the independent thinking that
    holding back was meant to protect.

- from: conditions-for-self-organization
  verb: tempers
  to: eight-step-change-process
  why: >-
    Where real complexity, diversity, passion, and urgency are all present, a
    staged, sequentially-controlled process risks being too slow or too
    controlling — the checklist names exactly when losing control to genuine
    self-organization outperforms coalition-driven staging.

- from: it-always-works
  verb: tempers
  to: guiding-coalition
  why: >-
    A coalition assembled to steer a colony toward a chosen vision assumes the
    outcome stays directable; a genuinely self-organizing process reliably
    produces authentic results but not necessarily the sponsor's wanted ones —
    control and authenticity trade off.

- from: holding-space
  verb: parallels
  to: negative-capability
  why: >-
    Both describe deliberately suspending action and judgment — near-total
    presence without directing, or tolerating unresolved uncertainty — to let
    an emergent process or idea develop further than premature intervention
    would allow.

- from: communal-validation-of-knowledge
  verb: parallels
  to: paradigm-conversion
  why: >-
    Both locate a field's real authority in a community's contested, ongoing
    social process — validating knowledge, or converting adherents — rather
    than in proof, certification, or any single knower's say-so.

- from: tacit-explicit-knowledge-blend
  verb: extends
  to: polanyis-paradox
  why: >-
    Polanyi's insight that we know more than we can tell explains why any
    codified document is incomplete; communities of practice extend that
    principle into organizational life, showing codified knowledge stays
    usable only when a community that still holds the tacit understanding
    behind it builds and owns the document.

- from: knowledge-as-knowing
  verb: parallels
  to: masterly-intuition
  why: >-
    Both reject expertise as a retrievable store of facts, describing it
    instead as an active, situated capacity — judgment in the moment, or a
    fused non-sequential feel — exercised rather than recalled.

- from: informal-structure-complements-formal
  verb: tempers
  to: reverse-conway-maneuver
  why: >-
    Deliberately reshaping formal team boundaries to pull architecture into a
    desired shape can sever the cross-cutting informal knowledge flow the old
    structure carried, which only a deliberately preserved informal network —
    not the redesign itself — restores.

- from: false-trust-vs-fake-trust
  verb: tempers
  to: first-move-trust-reciprocity
  why: >-
    A leader's first move to extend trust only triggers reciprocity if the
    trust is real — giving responsibility without authority, or performing
    openness while secretly micromanaging, both counterfeit the gesture and
    forfeit the reciprocity it was meant to invoke.

- from: trust-dividend-and-tax
  verb: parallels
  to: transaction-and-coordination-costs
  why: >-
    Both convert an invisible relational or process friction into an explicit
    economic cost — a trust "tax" or a coordination cost — that a
    well-functioning system is designed to minimize rather than treat as
    unavoidable overhead.

- from: self-trust-projection
  verb: parallels
  to: shadow-integration
  why: >-
    Both describe an unexamined internal deficit — missing self-trust, or the
    disowned shadow — that gets projected outward and misread as being about
    someone or something else, rather than confronted directly.

- from: declare-intent-attribution-asymmetry
  verb: parallels
  to: espoused-theory-vs-theory-in-use
  why: >-
    Both name the same structural gap between a person's trusted self-report
    — felt intent, or an espoused theory — and what their behavior actually
    shows an observer; declaring intent closes that gap because intent is
    consciously known, but the theory-in-use gap survives disclosure since it
    operates outside the person's own awareness.

- from: contracting-wants-and-offers
  verb: parallels
  to: trust-based-contracts
  why: >-
    Both replace an implicit, adversarial default — unstated expectations, or
    a fixed-price contract policing exploitation — with an explicit up-front
    exchange that prevents resentment or gaming from surfacing downstream.

- from: authentic-behavior
  verb: parallels
  to: vulnerability-based-trust
  why: >-
    Both claim that naming or admitting your actual internal state out loud —
    rather than performing competence or control — is what builds real trust
    and leverage in a relationship.

- from: manufactured-certainty-resistance
  verb: tempers
  to: resistance-blows-itself-out
  why: >-
    This resistance archetype isn't raw emotional venting but a strategic
    pattern of demanding impossible proof and escalating fear, so naming it
    neutrally and stepping aside doesn't dissolve it — it requires structural
    neutralization instead.
