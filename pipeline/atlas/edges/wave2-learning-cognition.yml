- from: context-variation-learning
  verb: extends
  to: transfer-of-learning
  why: >-
    Forcing retrieval in varied physical settings prevents a memory trace from
    binding to one context, which is the exact mechanism transfer needs: cues
    decoupled from a single environment generalize to new ones instead of
    staying locked to where they were learned.
- from: pre-testing-effect
  verb: extends
  to: formative-assessment-understanding
  why: >-
    Both invert assessment's default role from measuring completed learning to
    producing it: pre-testing pushes formative assessment's principle to an
    extreme case, showing that even a test given before instruction, answered
    entirely wrong, still enables learning by priming attention to the gaps ahead.
- from: dopamine-prediction-error
  verb: parallels
  to: five-questions
  why: >-
    Both compute a gap between a predicted or target state and the observed
    actual state, and treat that mismatch — not confirmation of success — as
    the operative signal driving the next adjustment, at neural and process
    scale respectively.
- from: dopamine-prediction-error
  verb: parallels
  to: promise-of-reward
  why: >-
    Same dopamine substrate, two distinct computations: prediction-error
    signals a correction after an outcome is known, while incentive-salience
    wanting drives pursuit before any outcome exists — conflating them reads
    motivation as if it were learning.
- from: certainty-as-dangerous-emotion
  verb: parallels
  to: tyranny-of-numbers
  why: >-
    Both show that a felt sense of certainty or engineering conviction is
    generated by internal momentum, not calibration against reality, and that
    exact feeling is what blinds the holder to a simpler or more accurate
    alternative sitting in plain sight.
- from: certainty-effect
  verb: parallels
  to: certainty-as-dangerous-emotion
  why: >-
    Both show a categorical, disproportionate psychological weight assigned to
    the boundary of full certainty — Kahneman's decision weights at 100%
    probability, Lehrer's felt conviction in a model — that diverges sharply
    from a linear function of true accuracy or objective probability.
- from: perceptual-learning
  verb: tempers
  to: design-expertise-deliberate-practice
  why: >-
    Names a class of skill — perceptual pattern discrimination — that
    strengthens through mere repeated exposure alone, without the effortful,
    guided ten-year regimen the deliberate-practice account claims is
    necessary for all expertise.
- from: affordances-and-signifiers
  verb: parallels
  to: functional-fixedness
  why: >-
    Both separate an object's true possibilities from what a person perceives
    as available: a missing signifier and a fixed-function assumption produce
    the identical failure — a genuine affordance sitting unused because
    nothing currently cues it into view.
- from: extended-mind
  verb: parallels
  to: knowledge-in-the-world
  why: >-
    Both argue precise behavior does not require precise internal memory —
    competence comes from off-loading state onto external tools, notes, or
    environmental cues that can be consulted on demand rather than recalled
    from inside the skull.
- from: transactive-memory
  verb: parallels
  to: team-cognitive-load-limits
  why: >-
    Both cope with bounded capacity for holding complexity by offloading it
    outward rather than expanding what's held: a shared platform relieves a
    team of infrastructure it needn't reason about, just as an external device
    relieves an individual of memory it needn't encode.
- from: ambient-awareness
  verb: parallels
  to: work-visibility
  why: >-
    Both claim default invisibility, not lack of information, is the real
    obstacle to coordination — making status or work state passively
    perceptible is the precondition for the intuitive awareness or fix that
    follows.
- from: audience-effect-on-cognition
  verb: parallels
  to: radical-transparency
  why: >-
    Both show that exposing thinking or plans while still rough and unfinished
    — not just the polished result — beats concealing until final: real-time
    audience feedback sharpens writing, and early disclosure preserves the
    trust that waiting for certainty would have cost.
- from: emotional-brain-pattern-recognition
  verb: parallels
  to: exemplar
  why: >-
    Both describe expertise as unconscious pattern-matching built from a large
    library of accumulated concrete cases rather than explicit rules — a
    community's shared exemplars function like the emotional brain's
    compressed pattern library, applied faster than deliberation.
- from: decision-complexity-rule
  verb: contradicts
  to: decision-quality-chain
  why: >-
    Lehrer's claim that complex, many-variable decisions are best delegated to
    unconscious pattern-matching directly conflicts with the DQ framework's
    insistence that consequential decisions require conscious, structured
    interrogation of frame, alternatives, information, and reasoning.
- from: emotions-as-decision-shortcuts
  verb: parallels
  to: filtering-abundance
  why: >-
    Both resolve choice overload by collapsing an unmanageable option set
    through a filtering layer — somatic markers compressing evaluations
    internally, curation systems compressing supply externally — rather than
    evaluating every option explicitly.
