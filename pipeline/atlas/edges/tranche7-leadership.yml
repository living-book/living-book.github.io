- from: deliberate-practice-for-leadership
  verb: contradicts
  to: crucibles-of-leadership
  why: >-
    Deliberate practice claims leadership capability is built through designed,
    repeatable, feedback-driven training; crucibles claims the most reliable
    builder is an unplanned, traumatic, unrepeatable ordeal — incompatible
    theories of how the same capacity forms.

- from: structural-fixes-dont-reach-behavior
  verb: tempers
  to: goldsmith-productivity-principle
  why: >-
    New systems and structures fail to change results when the people inside
    them keep using the same defensive reasoning the redesign was meant to
    bypass, limiting how far shifting focus from people to process can go.

- from: decisions-vs-outcomes
  verb: tempers
  to: belief-shapes-reality
  why: >-
    A decision's quality is judged by the process at the time it was made, not
    by whether belief in it was strong — conviction alone cannot convert a
    badly-reasoned choice into a good outcome.

- from: culture-follows-structure
  verb: tempers
  to: organizational-culture-and-strategy
  why: >-
    Culture-follows-structure makes the stronger claim that durable culture
    change in large organizations requires redesigning reporting lines and
    incentive structures specifically, tempering the treatment of leader
    modeling and symbolic behavior as comparably weighted culture-shaping
    levers.

- from: participative-decision-procedures
  verb: tempers
  to: advice-process
  why: >-
    Research shows decision-procedure effectiveness trades off quality,
    acceptance, and skill-development differently by context, so treating one
    procedure — seek advice, then decide alone — as universally superior
    ignores those contingencies.

- from: distributed-leadership
  verb: parallels
  to: holons-self-reliant-units
  why: >-
    Both replace one all-capable authority with autonomous units complete only
    in aggregate — no single leader or holon masters every capability, so the
    whole must recruit complementary parts.

- from: adaptive-challenges
  verb: parallels
  to: adaptive-governance
  why: >-
    Both reject solving complex, values-laden problems through expert
    technical control from the top, instead distributing behavioral change and
    decision authority to the people who must live the shift.

- from: eq-four-skill-model
  verb: formalizes
  to: emotional-intelligence
  why: >-
    The four-skill self/social by awareness/management matrix converts
    Goleman's five qualitative traits into a measurable, assessable structure
    with trainable strategies attached to each cell.

- from: advocacy-and-inquiry
  verb: extends
  to: espoused-theory-vs-theory-in-use
  why: >-
    Deliberately pairing a stated position with genuine open questioning gives
    leaders a concrete practice for surfacing the gap between the theory they
    believe they use and the one their real-time behavior reveals.

- from: leadership-cluelessness
  verb: instantiates
  to: mental-models
  why: >-
    Ron Johnson's confident JCPenney redesign is a concrete case of Senge's
    mental-models phenomenon — an unexamined internal picture diverging from
    ground truth, invisible to its holder until outcomes force it into
    view — while Gerstner's course-correction is the surfacing-and-testing
    move mental models prescribes.

- from: leadership-soul-and-ethics
  verb: extends
  to: frame-ethics
  why: >-
    It adds the "soul" mechanism to frame-ethics' four-question audit:
    sustaining ethical action across all four frames requires an
    integrative organizational character, not just meeting each frame's
    obligation as an independent checklist item — Medtronic showing soul's
    presence, J&J under Weldon its erosion into lip service.

- from: reframing-in-action
  verb: instantiates
  to: multiframe-thinking
  why: >-
    Applying structural, human-resource, political, and symbolic lenses to the
    same leadership dilemma to generate different responses is a working
    example of deliberately viewing one situation through incompatible frames.

- from: purpose-driven-leadership
  verb: extends
  to: intrinsic-motivation-framework
  why: >-
    It adds a leader-specific precondition to intrinsic motivation's
    purpose driver: authentically transmitting purpose to others requires
    the leader to have personally discovered and committed to it first,
    not merely designed work that explains the "why."

- from: accountability-through-transparency
  verb: parallels
  to: goal-transparency
  why: >-
    Both find that making expectations or goals publicly visible, not
    privately held, is what drives higher attainment, because visibility
    itself creates the pressure and alignment that privacy dissolves.

- from: 50000-foot-perspective
  verb: parallels
  to: mapping-altitude
  why: >-
    Both insist on deliberately analyzing a system at the macro level before
    descending to individual performance or process detail, because fixes
    found at the wrong altitude solve the wrong problem.

- from: order-winners-and-qualifiers
  verb: parallels
  to: kano-model
  why: >-
    Both split attributes into a baseline tier that merely qualifies for
    consideration and a differentiating tier that actually wins the choice,
    refusing to treat all requirements as equally decisive.

- from: pentality-of-forecasting
  verb: parallels
  to: business-model-environment
  why: >-
    Both structure environmental scanning as a fixed set of external force
    categories — customers, competitors, suppliers, trends — so anticipation
    becomes a systematic scan instead of an ad hoc guess.

- from: servant-leader-scrummaster
  verb: parallels
  to: servant-leadership
  why: >-
    Both ground leadership authority in service rather than command — an
    impediment-removing coach accountable for team success without
    directing work, and a leader whose influence is earned by serving
    others — rejecting positional power as leadership's real basis.

- from: craftsman-mindset
  verb: parallels
  to: craftsmanship-before-innovation
  why: >-
    Both insist that years of invisible, fundamentals-focused discipline —
    work done to a standard only the craftsman will ever know — are the
    foundation beneath what looks from outside like effortless mastery,
    with identity poured into the work rather than its visible output.

- from: calendar-commitment
  verb: parallels
  to: visible-calendar-kanban
  why: >-
    Both convert the calendar from a passive log of meetings into the primary
    operational system recording what will actually get done, treating a
    scheduled block the way a kanban treats a pulled work item.

- from: shepherd-leader
  verb: parallels
  to: servant-leadership-qualities
  why: >-
    Both reject a single fixed leadership stance in favor of a multifaceted
    repertoire held together at once — the shepherd's varying positions
    around the flock, the servant-leader's interconnected fabric of eight
    qualities — with the leader's own visibility never being the point.

- from: true-north-purpose
  verb: parallels
  to: lifes-task
  why: >-
    Both posit a fixed, discoverable orientation point — set once, not
    renegotiated — that a person navigates by across changing circumstance,
    rather than deriving direction fresh from each new situation.

- from: vital-few-80-20
  verb: parallels
  to: focus-and-commit
  why: >-
    Both demand explicit exclusion as the price of leverage — naming the
    handful of pursuits that will get real effort and being deliberate
    about what will not be pursued — rather than letting attention spread
    evenly across everything that seems worthwhile.
