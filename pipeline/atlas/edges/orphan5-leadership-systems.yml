- from: action-learning-ground-rules
  verb: instantiates
  to: simple-rules
  why: >-
    Two non-negotiable meta-rules (questions-only, coach authority) target the one
    bottleneck behavior — premature advocacy — while leaving what to actually say or
    ask to judgment, exactly the concrete-guidance-plus-latitude structure Simple
    Rules names.

- from: sincerity-not-curiosity
  verb: parallels
  to: breakthrough-learning
  why: >-
    Both gate real change on the same variable: idle intellectual engagement
    (curiosity, understanding-as-skill) leaves belief untouched, while genuine
    stakes (life-and-death sincerity, a significant urgent problem) is what
    actually triggers transformation of assumptions.

- from: active-listening-in-coaching
  verb: instantiates
  to: active-listening-spare-capacity
  why: >-
    Active listening in coaching's dimension "use excess thinking time
    appropriately" directly applies the general phenomenon: thought outpaces
    speech several times over, and that gap either drifts into private
    sidetracks or gets redirected toward decoding a leader's content and intent.

- from: coachability
  verb: instantiates
  to: entity-vs-incremental-theory
  why: >-
    The traits that predict coaching benefit — welcoming feedback, trying new
    approaches, admitting weakness, embracing change — are the observable
    behavioral signature of holding an incremental rather than fixed theory of
    one's own ability.

- from: coaching-partnership
  verb: instantiates
  to: consultant-stance-choice
  why: >-
    Coaching partnership is Block's collaborator stance applied to leadership
    development, explicitly rejecting the expert stance where the helper
    diagnoses and prescribes while the client is merely a recipient of solutions.

- from: coaching-funnel
  verb: parallels
  to: problem-space-vs-solution-space
  why: >-
    Both refuse to let a stated goal collapse prematurely into an answer — the
    funnel widens conversation before narrowing to action, exactly because
    naming a solution before the problem space is explored forecloses better
    answers.

- from: authentic-leadership-presence
  verb: parallels
  to: balance-of-opposites
  why: >-
    Tough empathy and selective vulnerability hold two qualities usually treated
    as tradeoffs — care and unsentimental honesty, strength and exposed
    weakness — in the same reconciled tension that reads as beautiful in
    buildings that resolve opposites.

- from: leadership-worldviews-and-stories
  verb: instantiates
  to: theory-laden-perception
  why: >-
    A leader's concepts, causal beliefs, and values are the governing framework
    through which they perceive a situation at all, so leaders with sparse
    frames literally cannot perceive, and therefore cannot tell, certain stories.

- from: influence-outcomes-taxonomy
  verb: parallels
  to: model-ii-theory-in-use
  why: >-
    Yukl's compliance/resistance outcomes trace to the same unilateral-control
    tactics as Argyris's Model I, while genuine commitment requires the same
    free, informed engagement Model II names as the source of internal
    commitment.

- from: leader-member-exchange
  verb: parallels
  to: pygmalion-leadership-expectations
  why: >-
    Both describe the identical feedback loop: a leader's early belief about
    someone's competence shapes how much the leader invests in them, which then
    shapes actual performance, confirming the original belief either way.

- from: power-dynamics
  verb: parallels
  to: transient-competitive-advantage
  why: >-
    Both show a position of advantage — organizational power over a critical
    contingency, market advantage over a segment — persists only as long as the
    underlying problem it resolves stays unsolved, then evaporates once it isn't.

- from: async-sync-communication-matching
  verb: parallels
  to: classes-of-service
  why: >-
    Both triage by the same variable — how costly delay is for this specific
    item — sorting messages or work into named handling policies instead of
    applying one uniform channel or priority to everything.

- from: task-tool-genre-matching
  verb: parallels
  to: task-shape-patterns
  why: >-
    Both reject a uniform default (one collaboration platform, one column
    layout) in favor of first diagnosing the task's actual structure, then
    matching tool or visualization shape to that structure.

- from: feedback-loop-engagement
  verb: parallels
  to: metrics-feedback-loop
  why: >-
    Both close the same loop — collect data on real impact, analyze what's
    landing, adjust the message or the work, repeat — applied to leadership
    communication instead of team delivery metrics.

- from: four-principles-of-open-space
  verb: parallels
  to: type-ii-emergent-properties
  why: >-
    A session's value — who came, what happened — is not stored or plannable
    but exists only in the live interactions themselves, exactly the Type II
    property that must be reproduced fresh, never banked.

- from: love-as-antidote
  verb: parallels
  to: circle-of-safety
  why: >-
    Both locate the same biological switch: threat/fear recruits the
    reptilian, self-preserving brain and drains capacity, while safety/love
    recruits the neocortex, freeing generosity, cooperation, and sustained
    effort.

- from: leading-upward
  verb: instantiates
  to: servant-leadership
  why: >-
    Leading upward is servant leadership's mechanism — earning influence
    through unselfish service — pointed at the boss relationship instead of its
    usual downward direction toward subordinates.

- from: developing-leaders-functionaries
  verb: parallels
  to: self-determination
  why: >-
    Both find the same driver of capability: people who design and take
    responsibility for their own decisions and procedures develop and perform
    better than those who only execute procedures handed to them.

- from: compensatory-beauty
  verb: parallels
  to: shadow-integration
  why: >-
    Both hold that what a self lacks or denies does not vanish but resurfaces
    indirectly — as an aesthetic craving in de Botton, as distorted behavior in
    Greene's shadow — making the absence legible rather than a neutral fact.

- from: specificity-manifestation
  verb: parallels
  to: key-examples
  why: >-
    Both diagnose the same failure: vague or abstract statements give the
    executing system — subconscious mind or software — no concrete target to
    act on, while specific, concrete language becomes directly actionable.

- from: purposeful-choice-dimensions
  verb: parallels
  to: many-model-thinking
  why: >-
    Both replace a single explanatory lens with several held simultaneously to
    catch what any one framework misses: purposeful-choice-dimensions
    triangulates rational, emotional, and cultural drivers of a decision, the
    same multi-lens correction many-model-thinking prescribes for causal models.

- from: dissolving-the-why-question
  verb: instantiates
  to: self-imposed-constraints
  why: >-
    The "why nothing" puzzle survives only because the questioner unknowingly
    imposes the assumption that nothing is a coherent alternative to something —
    removing that hidden assumption dissolves the puzzle entirely, exactly like
    any self-imposed constraint.

- from: reason-without-cause
  verb: tempers
  to: sufficient-cause-thinking
  why: >-
    Effect-cause-effect diagramming assumes every explained thing has a
    producing cause; Reason Without Cause names a terminus with a reason for
    being so but no efficient cause at all, where that diagramming does not
    apply.
