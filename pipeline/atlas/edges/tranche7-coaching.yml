# Lens: COACHING, QUESTIONS & DEVELOPMENT
# Anchor books: coaches-guide-exemplary-leaders, clean-coaching,
# good-leaders-ask-great-questions, action-learning, year-with-peter-drucker,
# finding-your-element, do-more-great-work

- from: suggestion-contamination
  verb: tempers
  to: oars-reflective-listening
  why: >-
    Suggestion contamination shows that paraphrasing a person's words back to
    them embeds the questioner's own interpretation, naming the exact
    condition under which OARS's core reflection technique stops clarifying
    and starts planting a belief the speaker never actually held.

- from: wise-ignorance
  verb: tempers
  to: expert-chunking
  why: >-
    Wise ignorance names the coaching condition where expert pattern-matching
    backfires: the compressed "chunks" that let experts see quickly also let
    a coach silently predict the coachee's answer, foreclosing the genuine
    discovery the coach's not-knowing is meant to protect.

- from: coach-roles
  verb: contradicts
  to: insider-perspective
  why: >-
    The COACH model's Advisor role has the coach supply guidance and
    experience-based navigation, directly opposing insider-perspective's
    claim that answers for self-directed change must originate solely from
    the coachee, never be imported from an outside expert.

- from: tacit-explicit-knowledge
  verb: contradicts
  to: knowledge-as-knowing
  why: >-
    Action learning assumes tacit expertise can be converted through
    questioning into explicit, bankable organizational knowledge, while
    knowledge-as-knowing argues expertise is situated judgment-in-the-moment
    that cannot be extracted and stored unchanged without losing what made it work.

- from: l-equals-p-plus-q-plus-r
  verb: contradicts
  to: operant-conditioning-applied
  why: >-
    L=P+Q+R insists learning only occurs when programmed knowledge is worked
    over by questions and reflection, contradicting operant conditioning's
    model where behavior is shaped purely by external reinforcement
    schedules with no role for the learner's own inquiry.

- from: edge-of-chaos
  verb: parallels
  to: adaptive-governance
  why: >-
    Both locate peak team performance not at maximal structure or maximal
    freedom but at a bounded edge — a handful of fixed ground rules or
    principles that preserve coherence while leaving everything else open
    to emergent, adaptive response.

- from: systems-thinking-adaptive
  verb: parallels
  to: feedback-loops
  why: >-
    Both reject a linear cause-effect model of problems in favor of
    interacting relationships where effects ripple unpredictably across
    the system, so the highest-leverage point to intervene is rarely the
    place nearest to where the symptom appears.

- from: problem-reframing
  verb: parallels
  to: five-whys
  why: >-
    Both refuse to act on a problem's first presented form — one drills
    down through repeated causal "whys," the other surfaces a group's
    differing perceptual framings — insisting the real target problem is
    unknowable until that work is done.

- from: idea-generation-beyond-first
  verb: parallels
  to: node-generation
  why: >-
    Both diagnose the same failure — locking onto the first plausible idea —
    and prescribe the same fix: generate a wide, independent set of options
    before any evaluation begins, because early judgment suppresses the
    quantity that creativity depends on.

- from: saying-yes-slowly
  verb: parallels
  to: last-responsible-moment
  why: >-
    Both treat premature commitment as the error to design against,
    deliberately inserting a delay or clarifying question before locking
    in, because the option value destroyed by a snap "yes" or an early
    decision can't be recovered later.

- from: peak-moments
  verb: parallels
  to: destiny-experiences
  why: >-
    Both reject asking a person directly what their purpose is, instead
    collecting discrete moments of peak engagement or performance and
    finding the recurring pattern across them — purpose surfaces from
    evidence, not self-report.

- from: element-tribes
  verb: parallels
  to: communities-of-practice
  why: >-
    Both treat a passion- or domain-bound group as the load-bearing social
    structure for expertise and identity rather than solitary effort —
    element tribes supplying affirmation, mentorship, and inspiration
    around a shared passion, communities of practice generalizing the
    same mechanism to any group bound by a shared concern or problem.

- from: active-listening-for-leaders
  verb: extends
  to: emotional-filters-listening
  why: >-
    Maxwell's structural safeguards — an open-ear policy, deputizing an
    assistant to say what he needs to hear rather than wants to hear —
    build a concrete countermeasure directly on top of the mechanism
    emotional-filters-listening names: emotion selectively blocking
    disconfirming information by default.

- from: servant-leadership-inquiry
  verb: parallels
  to: high-trust-servant-leadership
  why: >-
    Both replace the leader's default directive stance with an explicit
    enabling question or posture — "how can I serve you," impediment
    removal — that relocates authority over the work to the people
    actually doing it.

- from: experience-evaluation
  verb: parallels
  to: pdsa-cycle
  why: >-
    Both insist a reflection step must be forced onto the end of every
    action, not assumed to happen automatically — asking "what did you
    learn" and PDSA's Study phase both convert raw experience into usable
    insight through a deliberate, repeatable question.

- from: grounded-leadership
  verb: parallels
  to: vulnerability-as-courage
  why: >-
    Both argue that closing the gap between a polished public persona and
    an honest self — through visible admission of weakness rather than its
    concealment — is what earns real connection and trust, not what
    threatens it.

- from: perspective-expansion-through-questions
  verb: parallels
  to: mental-models
  why: >-
    Both treat pointed inquiry as the mechanism that surfaces assumptions
    a person cannot see from inside their own perspective — Maxwell's
    fresh-eyes questions dislodging stagnant thinking, mental models'
    reflective inquiry exposing the gap between espoused theory and
    theory-in-use.

- from: coach-roles
  verb: parallels
  to: consultant-stance-choice
  why: >-
    Both catalog a repertoire of distinct helper stances a person shifts
    between based on the situation rather than adopting one fixed
    identity — the COACH model's five roles, consulting's
    expert/pair-of-hands/collaborator trio — treating role-flexibility
    itself as the competency.

- from: solution-oriented-question
  verb: tempers
  to: powerful-questions-in-coaching
  why: >-
    Solution-oriented-question shows that a question's open grammar
    doesn't guarantee an exploratory function — "shouldn't you check with
    your boss?" is advice wearing a question mark — naming the condition
    under which a "powerful question" is secretly an answer in disguise.
