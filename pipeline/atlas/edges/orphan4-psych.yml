- from: decision-as-destiny
  verb: parallels
  to: commitments-not-plans
  why: >-
    Both isolate one binding mental or social act — a decision, a commitment —
    as the true cause of a future outcome, while dismissing the passive
    artifact around it (conditions, a written plan) as never itself obligating.

- from: life-values-hierarchy
  verb: parallels
  to: outcome-over-output
  why: >-
    Both separate the real result actually wanted (ends values, the behavior
    change in people) from the circumstances or features pursued to get there
    (means values, output), naming confusion between the two as the core error.

- from: quality-questions
  verb: parallels
  to: asking-different-questions
  why: >-
    Both locate leverage in the question itself: the habitual question a
    person or a leadership team defaults to quietly fixes what gets noticed,
    so deliberately changing the question — not the answer — changes the outcome.

- from: transformational-vocabulary
  verb: parallels
  to: language-as-operating-system
  why: >-
    Both claim habitual language functions as an installed operating system
    that sets the boundary of perceivable experience, so changing one word or
    pattern instantly changes what a person can feel or create.

- from: boundaries-define-self
  verb: parallels
  to: circle-of-competence
  why: >-
    Both draw a hard, deliberate line around what is genuinely one's own —
    self versus not-me, known versus unknowable — and treat confusing what's
    inside the line with what's outside it as the source of real damage.

- from: object-constancy
  verb: parallels
  to: circle-of-safety
  why: >-
    Both argue that a felt, internalized sense of security is the precondition
    for higher-order function — setting a boundary, turning outward against
    real threats — rather than an obstacle that security-seeking gets in the way of.

- from: separation-individuation
  verb: parallels
  to: stepping-up-process
  why: >-
    Both model identity change as a fixed sequence of stages moving away from
    fusion with a prior attachment — a parent, an old role — toward a
    distinct self, not as a single conversion moment or a straight line.

- from: breaking-habit-of-self
  verb: parallels
  to: identity-based-habits
  why: >-
    Both locate lasting behavior change in identity, not willpower: a pattern
    persists because it has become "who you are," so change requires
    dismantling and rebuilding the self-concept the pattern is anchored to.

- from: memorized-emotional-state
  verb: parallels
  to: craving-brain
  why: >-
    Both describe a state becoming self-sustaining only once repetition lets
    the brain anticipate and generate it automatically, so the felt pull
    toward the pattern arrives before any conscious choice to enact it.

- from: superstitious-thinking
  verb: contradicts
  to: operant-conditioning-applied
  why: >-
    Clarity insists external events never directly cause internal states —
    only thought about them does — which directly denies operant
    conditioning's premise that external consequences reliably shape behavior and feeling.

- from: psychological-immune-system
  verb: parallels
  to: buffer-management
  why: >-
    Both are early-warning mechanisms that convert an otherwise invisible
    drift toward failure into a graded, actionable signal — distress feelings,
    buffer penetration — that arrives before the deadline or breakdown itself.

- from: intuition-wisdom-navigation
  verb: contradicts
  to: masterly-intuition
  why: >-
    Both use "intuition" for a fast, non-analytic guidance sense, but locate
    its source oppositely: Smart's intuition precedes and excludes accumulated
    experience, while Greene's is accumulated experience fused into feel.

- from: self-efficacy-meadows
  verb: parallels
  to: pygmalion-leadership-expectations
  why: >-
    Both describe belief in capability — one's own, or another's held by a
    leader — as a self-fulfilling loop that directly shapes persistence,
    goal-setting, and the eventual achievement it predicted.

- from: social-modeling-peer-influence
  verb: parallels
  to: threshold-cascades
  why: >-
    Both explain behavior propagating through a group once individuals
    observe enough visible others already acting or succeeding to cross their
    own personal threshold for joining in.

- from: discomfort-tolerance
  verb: instantiates
  to: antifragility
  why: >-
    Voluntarily dosing the body and mind with manageable stressors — cold,
    hunger, rejection — so the system adapts and strengthens is a personal-
    scale case of a system that gains from volatility rather than merely resisting it.

- from: internal-external-motivation
  verb: parallels
  to: intrinsic-motivation-framework
  why: >-
    Both find that autonomy- and mastery-driven motivation sustains effort
    indefinitely while externally-sourced motivation (medals, pay, status)
    fades the moment the extrinsic reward stops arriving.

- from: good-bad-great-work
  verb: parallels
  to: meaningful-work
  why: >-
    Both distinguish work that merely functions from work that carries
    personal significance, arguing that only the meaningful category fuels
    genuine engagement while the merely-adequate kind never does.

- from: motivation-direction
  verb: parallels
  to: zone-offense-defense
  why: >-
    Both frame a binary orientation — toward opportunity versus away from
    threat, offense versus defense — as a mutually exclusive stance that must
    be identified because it determines the whole strategy that follows.

- from: conditioned-reinforcer-marker-signal
  verb: parallels
  to: done-rules-enforcing-upstream-quality
  why: >-
    Both replace a vague, disputable judgment call with an explicit, agreed
    signal that unambiguously marks the exact moment a desired state has been
    reached, letting reinforcement or progression happen precisely and on time.

- from: mindfulness-and-curiosity
  verb: parallels
  to: wise-ignorance
  why: >-
    Both deliberately suspend premature judgment or expectation — observing
    without reacting, not-knowing what comes next — to open a space in which
    a better response or discovery can emerge on its own.

- from: showing-up
  verb: parallels
  to: resistance-blows-itself-out
  why: >-
    Both find that directly facing and naming a difficult experience — an
    emotion, an organizational resistance — dissolves its grip faster than
    avoiding, fixing, or arguing against it ever could.

- from: circle-of-safety
  verb: tempers
  to: emotional-contagion
  why: >-
    A felt boundary of safety inside a group acts as a circuit breaker on
    contagion: it names the condition under which one person's emotional
    outburst fails to escalate into a group-wide threat response.

- from: eq-neuroplasticity
  verb: parallels
  to: myelin-insulation
  why: >-
    Both root a claimed capacity's trainability in the same physical
    mechanism — repeated practice literally growing new neural connections or
    insulation — distinguishing it from traits assumed fixed at birth.

- from: trigger-events
  verb: parallels
  to: self-trust-projection
  why: >-
    Both argue an emotional reaction in the present — a trigger, chronic
    distrust — is actually rooted in a person's own unexamined history, not
    accurately caused by the present stimulus, and must be traced to its source.

- from: worst-first-work-sequencing
  verb: tempers
  to: wsjf-sequencing
  why: >-
    WSJF claims dividing cost-of-delay by duration is the mathematically
    optimal sequencing rule, but naming procrastination-avoidance as a
    countervailing force shows pure economic sequencing can miss real human behavior.

- from: bodhichitta-and-motivation
  verb: parallels
  to: servant-leadership
  why: >-
    Both redirect a personal practice away from self-advancement and toward
    genuine service to others as the actual source of its power, converting
    ego-driven pursuit into authentic contribution.

- from: aptitude-assessment-process
  verb: parallels
  to: feedback-analysis
  why: >-
    Both replace unreliable introspection or self-report with systematic
    real-world testing — trying activities and comparing what actually
    happens against expectation — as the only reliable way to discover
    genuine ability.

- from: exposure-access-discovery
  verb: parallels
  to: forced-collision-architecture
  why: >-
    Both argue latent potential — a passion, a cross-disciplinary insight —
    stays inert without deliberately engineered physical access or contact,
    so opportunity for exposure is a precondition, not an incidental extra.

- from: mindset-and-self-imposed-barriers
  verb: parallels
  to: self-imposed-constraints
  why: >-
    Both locate the real obstacle inside an unexamined assumption the person
    unknowingly imposes on the situation, so removing the assumption — not
    the external circumstance — is what turns a barrier into a starting point.

- from: building-on-ideas
  verb: parallels
  to: braintrust
  why: >-
    Both convert candid feedback into collaborative problem-solving rather
    than a mandate or dismissal, preserving the ownership and creative energy
    of the original idea while still surfacing real concerns.

- from: facts-over-slogans
  verb: parallels
  to: cascading-communication
  why: >-
    Both find that authentic, informal, person-delivered substance lands with
    employees where polished top-down broadcast messaging or slogans reliably
    fail, because frontline cynicism discounts anything that sounds rehearsed.

- from: listening-for-ideas
  verb: parallels
  to: listening-to-structure
  why: >-
    Both listen past the literal words or facts to reconstruct the deeper
    organizing idea or narrative structure beneath what someone is actually saying.

- from: reading-nonverbal-messages
  verb: parallels
  to: calm-assertive-presence
  why: >-
    Both locate the real persuasive or emotional payload in nonverbal
    channels — tone, expression, body language — that carry messages words
    alone are too risky or too slow to send.

- from: phytoncide-effect
  verb: parallels
  to: invisible-infrastructure
  why: >-
    Both name a real, measurable causal channel that produces its benefit
    while staying invisible beneath a more visible, differently-credited
    explanation — a biochemical effect hidden under "feeling restored."
