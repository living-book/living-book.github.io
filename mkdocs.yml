site_name: Living Books
site_description: Book companions that improve with your feedback
site_url: https://living-book.github.io/
repo_url: https://github.com/living-book/living-book.github.io

theme:
  name: material
  palette:
    scheme: default
    primary: deep orange
    accent: deep orange
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

# ponytail: no explicit nav — MkDocs auto-nav from dirs; files numbered so order correct.
# Add awesome-pages plugin when a second book needs custom section ordering.
